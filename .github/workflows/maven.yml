name: Java CI

on:
  push:
    paths-ignore:
      # Note the double asterisk; a single asterisk does not suffice
      - '**.md'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      actions: read

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@v2.19.0
      with:
        egress-policy: block
        allowed-endpoints: >
          github.com:443
          repo.maven.apache.org:443

    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Set up JDK 17
      uses: actions/setup-java@v5.2.0
      with:
        distribution: temurin
        java-version: 17

    - name: Cache Maven Dependencies (~/.m2/repository)
      uses: actions/cache@v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-:

    - name: Build Packages 
      run: ./mvnw -ntp clean verify
